name: admin_web
description: VanYatra Admin Dashboard - Flutter Web Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # HTTP Client
  dio: ^5.4.3
  http: ^1.2.0
  
  # UI Components
  data_table_2: ^2.5.12
  fl_chart: ^0.68.0
  file_picker: ^8.0.0+1
  intl: ^0.19.0
  fluttertoast: ^8.2.4
  shimmer: ^3.0.0
  loading_animation_widget: ^1.2.1
  
  # Maps & Location
  google_maps_flutter_web: ^0.5.7
  google_maps_flutter_platform_interface: ^2.6.0
  
  # Real-time
  signalr_netcore: ^1.3.7
  web_socket_channel: ^2.4.5
  
  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  
  # URL Launcher
  url_launcher: ^6.3.0
  
  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
