name: Deploy Passenger Web to Azure VM

on:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
      - '.github/workflows/deploy-passenger-web.yml'
  workflow_dispatch:

concurrency:
  group: passenger-web-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Get dependencies
        working-directory: ./mobile
        run: flutter pub get
      
      - name: Build web app
        working-directory: ./mobile
        run: flutter build web --release --web-renderer auto
      
      - name: Create deployment package
        working-directory: ./mobile/build
        run: tar -czf passenger-web.tar.gz web/
      
      - name: Deploy to Azure VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          source: "mobile/build/passenger-web.tar.gz"
          target: "/tmp/"
          strip_components: 2
      
      - name: Extract and deploy on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/passenger
            sudo tar -xzf /tmp/passenger-web.tar.gz -C /var/www/passenger --strip-components=1
            sudo chown -R www-data:www-data /var/www/passenger
            sudo systemctl reload nginx
            rm /tmp/passenger-web.tar.gz
            echo "✅ Passenger web deployed successfully at $(date)"
