name: Build and Deploy to Azure VM

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/deploy-to-azure-vm.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Remove bin and obj folders
        run: |
          rm -rf ./server/ride_sharing_application/RideSharing.API/bin
          rm -rf ./server/ride_sharing_application/RideSharing.API/obj

      - name: Clean build artifacts
        run: dotnet clean ./server/ride_sharing_application/RideSharing.API

      - name: Restore NuGet packages
        run: dotnet restore ./server/ride_sharing_application/RideSharing.API

      - name: Build in Production mode (net8.0)
        run: dotnet build ./server/ride_sharing_application/RideSharing.API --configuration Production -f net8.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/vanyatra-server:latest

      - name: SSH to Azure VM and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            # Pull latest image
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/vanyatra-server:latest
            
            # Create network if doesn't exist
            if ! docker network ls | grep -w vanyatra-net; then
              docker network create vanyatra-net
            fi
            
            # Create persistent volume if doesn't exist
            if ! docker volume ls | grep -w sqldata-persistent; then
              docker volume create sqldata-persistent
            fi
            
            # Check if SQL Server container exists and is running
            if ! docker ps | grep -w vanyatra-sql; then
              echo "Starting SQL Server with persistent storage..."
              
              # Remove old SQL container if it exists (stopped)
              docker rm vanyatra-sql 2>/dev/null || true
              
              # Start SQL Server with persistent volume
              docker run -d \
                --name vanyatra-sql \
                --network vanyatra-net \
                -e "ACCEPT_EULA=Y" \
                -e "SA_PASSWORD=${{ secrets.SQL_SA_PASSWORD }}" \
                -p 1433:1433 \
                -v sqldata-persistent:/var/opt/mssql \
                --restart unless-stopped \
                mcr.microsoft.com/azure-sql-edge:latest
              
              # Wait for SQL to be ready
              echo "Waiting for SQL Server to be ready..."
              sleep 20
              
              # Create database if it doesn't exist
              docker exec vanyatra-sql /opt/mssql-tools/bin/sqlcmd \
                -S localhost -U sa -P "${{ secrets.SQL_SA_PASSWORD }}" \
                -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'RideSharingDb') CREATE DATABASE RideSharingDb" \
                || echo "Database creation attempted"
            else
              echo "SQL Server already running with persistent data - skipping restart"
            fi
            
            # Deploy application container (only this gets updated)
            echo "Deploying application..."
            docker stop vanyatra-server 2>/dev/null || true
            docker rm vanyatra-server 2>/dev/null || true
            
            docker run -d \
              --name vanyatra-server \
              --network vanyatra-net \
              -p 8000:8080 \
              -e "ASPNETCORE_ENVIRONMENT=Production" \
              -e "ConnectionStrings__RideSharingConnectionString=Server=vanyatra-sql,1433;Database=RideSharingDb;User Id=sa;Password=${{ secrets.SQL_SA_PASSWORD }};TrustServerCertificate=True;" \
              -e "ConnectionStrings__RideSharingAuthConnectionString=Server=vanyatra-sql,1433;Database=RideSharingDb;User Id=sa;Password=${{ secrets.SQL_SA_PASSWORD }};TrustServerCertificate=True;" \
              -e "JwtSettings__secretKey=kjsdfhiosdfihAkjdfAdfh823knhf323kjnfHAnnsf023lsdfh" \
              --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/vanyatra-server:latest
            
            # Wait for application to start
            sleep 10
            
            # Verify deployment
            echo "Verifying deployment..."
            if docker ps | grep -w vanyatra-server && docker ps | grep -w vanyatra-sql; then
              echo "✅ Deployment successful"
              echo "SQL Server: Running with persistent data"
              echo "Application: Running"
            else
              echo "❌ Deployment verification failed"
              exit 1
            fi
