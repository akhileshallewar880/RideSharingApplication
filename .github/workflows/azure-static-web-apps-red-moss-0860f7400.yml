name: Azure Static Web Apps CI/CD - Admin Web

on:
  push:
    branches:
      - main
    paths:
      - 'admin_web/**'
  workflow_dispatch: # Manual trigger
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
       id-token: write
       contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Install Flutter dependencies
        run: |
          cd admin_web
          flutter pub get
      
      - name: Build Flutter Web
        run: |
          cd admin_web
          echo "=== Flutter version ==="
          flutter --version
          echo ""
          echo "=== Cleaning previous builds ==="
          flutter clean
          echo ""
          echo "=== Getting dependencies ==="
          flutter pub get
          echo ""
          echo "=== Building web app ==="
          flutter build web --release
          echo ""
          echo "=== Build completed ==="
      
      - name: List build directory structure
        run: |
          echo "=== Checking admin_web/build structure ==="
          find admin_web/build -type f -name "*.html" || echo "No HTML files found"
          echo ""
          echo "=== Contents of admin_web/build/web ==="
          ls -la admin_web/build/web/ || echo "Directory doesn't exist"
      
      - name: Copy Static Web App Config
        run: |
          if [ -f "admin_web/staticwebapp.config.json" ]; then
            cp admin_web/staticwebapp.config.json admin_web/build/web/
            echo "✅ Copied staticwebapp.config.json"
          fi
      
      - name: Verify Build Output
        run: |
          echo "Checking build output directory..."
          ls -la admin_web/build/web/
          if [ -f "admin_web/build/web/index.html" ]; then
            echo "✅ index.html found"
          else
            echo "❌ index.html NOT found - checking if it's in a subdirectory"
            find admin_web/build -name "index.html" -type f
            echo "Build may have failed. Check Flutter build logs above."
            exit 1
          fi
      
      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client
      
      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
           script: |
               const coredemo = require('@actions/core')
               return await coredemo.getIDToken()
           result-encoding: string
      
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_MOSS_0860F7400 }}
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, https://aka.ms/swaworkflowconfig
          app_location: "admin_web/build/web" # Pre-built Flutter web output
          api_location: "" # Api source code path - optional
          output_location: "" # Already built, no additional output
          skip_app_build: true # Flutter already built, skip Oryx build
          github_id_token: ${{ steps.idtoken.outputs.result }}
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
