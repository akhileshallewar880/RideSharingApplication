name: Deploy .NET API to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build and Publish
        run: |
          dotnet restore server/ride_sharing_application/RideSharing.API/RideSharing.API.csproj
          dotnet build server/ride_sharing_application/RideSharing.API/RideSharing.API.csproj --configuration Release
          dotnet publish server/ride_sharing_application/RideSharing.API/RideSharing.API.csproj --configuration Release --output ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./publish

      # Optional: Set connection strings and app settings
      # You can use Azure CLI or Azure App Service Settings action if needed
