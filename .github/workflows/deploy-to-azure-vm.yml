      - name: Remove bin and obj folders
        run: |
          rm -rf ./server/ride_sharing_application/RideSharing.API/bin
          rm -rf ./server/ride_sharing_application/RideSharing.API/obj


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Remove bin and obj folders
        run: |
          rm -rf ./server/ride_sharing_application/RideSharing.API/bin
          rm -rf ./server/ride_sharing_application/RideSharing.API/obj

      - name: Clean build artifacts
        run: dotnet clean ./server/ride_sharing_application/RideSharing.API

      - name: Restore NuGet packages
        run: dotnet restore ./server/ride_sharing_application/RideSharing.API

      - name: Build in Production mode (net8.0)
        run: dotnet build ./server/ride_sharing_application/RideSharing.API --configuration Production -f net8.0

      - name: Run database migrations
        run: dotnet ef database update --project ./server/ride_sharing_application/RideSharing.API --startup-project ./server/ride_sharing_application/RideSharing.API --configuration Production --context RideSharing.API.Data.RideSharingDbContext
        env:
          ConnectionStrings__RideSharingConnectionString: ${{ secrets.DB_CONNECTION_STRING }}
          JwtSettings__secretKey: ${{ secrets.JWT_SECRET_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/vanyatra-server:latest

      - name: SSH to Azure VM and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/vanyatra-server:latest
            docker stop vanyatra-server || true
            docker rm vanyatra-server || true
            # Create a user-defined Docker network if it doesn't exist
            if ! docker network ls | grep -w vanyatra-net; then
              docker network create vanyatra-net
            fi


            # Stop and remove any existing SQL Server container to free up port 1433
            docker stop vanyatra-sql || true
            docker rm vanyatra-sql || true

            # Run SQL Server container on the user-defined network
            docker run -d --name vanyatra-sql --network vanyatra-net -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=${{ secrets.SQL_SA_PASSWORD }}" -p 1433:1433 mcr.microsoft.com/mssql/server:2022-latest

            # Remove old API container if exists
            docker rm -f vanyatra-server || true

            # Run API container on the same network
            docker run -d --name vanyatra-server --network vanyatra-net -p 8000:8080 \
              -e "ConnectionStrings__RideSharingConnectionString=${{ secrets.DB_CONNECTION_STRING }}" \
              -e "JwtSettings__secretKey=kjsdfhiosdfihAkjdfAdfh823knhf323kjnfHAnnsf023lsdfh" \
              ${{ secrets.DOCKERHUB_USERNAME }}/vanyatra-server:latest
