name: Deploy .NET API to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: server/ride_sharing_application/RideSharing.API/RideSharing.API.csproj
  PUBLISH_DIR: publish

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Build & Publish
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Write the Firebase service account from a base64-encoded GitHub Secret.
      # The secret FIREBASE_SERVICE_ACCOUNT_B64 must contain the single-line
      # base64 output of: base64 -i firebase-service-account.json | tr -d '\n'
      # Passing via env avoids GitHub Actions expression quoting issues.
      - name: Write Firebase service account
        env:
          FIREBASE_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
        run: |
          echo "$FIREBASE_B64" | base64 -d \
            > server/ride_sharing_application/RideSharing.API/firebase-service-account.json
          python3 -c "import json; d=json.load(open('server/ride_sharing_application/RideSharing.API/firebase-service-account.json')); pk=d.get('private_key',''); assert '-----BEGIN PRIVATE KEY-----' in pk,'private_key malformed'; print('Valid. Project:',d.get('project_id'),'lines:',pk.count(chr(10)))"

      - name: Restore & Publish
        run: |
          dotnet restore ${{ env.PROJECT_PATH }}
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --output ${{ env.PUBLISH_DIR }}

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: ${{ env.PUBLISH_DIR }}
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Deploy to Azure
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Download publish artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app
          path: ${{ env.PUBLISH_DIR }}

      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_DIR }}

      # Retry loop — Azure App Service cold starts can take 60-90 s.
      # Polls every 15 s for up to 2 minutes before failing.
      - name: Smoke test
        run: |
          URL="${{ steps.deploy.outputs.webapp-url }}/swagger/v1/swagger.json"
          echo "Polling: $URL"
          MAX_ATTEMPTS=8
          SLEEP_SEC=15
          for i in $(seq 1 $MAX_ATTEMPTS); do
            STATUS=$(curl --silent --max-time 10 --output /dev/null \
                          --write-out "%{http_code}" "$URL" || echo "000")
            echo "Attempt $i/$MAX_ATTEMPTS → HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Deployment verified"
              exit 0
            fi
            if [ "$i" -lt "$MAX_ATTEMPTS" ]; then
              echo "  Not ready yet, waiting ${SLEEP_SEC}s..."
              sleep $SLEEP_SEC
            fi
          done
          echo "❌ App did not return 200 after $((MAX_ATTEMPTS * SLEEP_SEC))s — check Azure App Service logs"
          exit 1
