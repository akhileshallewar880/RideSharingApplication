name: Deploy .NET API to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: server/ride_sharing_application/RideSharing.API/RideSharing.API.csproj
  PUBLISH_DIR: publish

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Build & Publish
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Decode the Firebase service account from the base64 GitHub Secret and
      # write it into the project directory. The .csproj has
      # CopyToOutputDirectory=PreserveNewest so dotnet publish bundles it
      # automatically into the publish folder.
      - name: Write Firebase service account
        run: |
          printf '%s' "${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}" \
            | base64 --decode \
            > server/ride_sharing_application/RideSharing.API/firebase-service-account.json

      - name: Restore & Publish
        run: |
          dotnet restore ${{ env.PROJECT_PATH }}
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --output ${{ env.PUBLISH_DIR }}

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: ${{ env.PUBLISH_DIR }}
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Deploy to Azure
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Download publish artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app
          path: ${{ env.PUBLISH_DIR }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_DIR }}

      # Wait for the app to cold-start, then verify Swagger is reachable.
      # A 200 on swagger.json confirms: app started, JWT config read OK,
      # and all controllers registered properly.
      - name: Smoke test
        run: |
          echo "Waiting 25 s for app to cold-start..."
          sleep 25
          URL="https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/swagger/v1/swagger.json"
          STATUS=$(curl --silent --max-time 15 --output /dev/null --write-out "%{http_code}" "$URL")
          echo "GET $URL → HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Deployment verified"
          else
            echo "❌ Unexpected status $STATUS — check Azure App Service logs"
            exit 1
          fi
